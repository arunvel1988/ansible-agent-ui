<!DOCTYPE html>
<html>
<head>
    <title>Ansible AI Agent</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui;
            background: #343541;
            color: white;
        }

        header {
            text-align: center;
            padding: 12px;
            font-size: 18px;
            background: #202123;
            border-bottom: 1px solid #444;
        }

        #chat {
            height: 85vh;
            overflow-y: auto;
            padding: 20px;
        }

        .msg {
            max-width: 70%;
            padding: 14px;
            margin: 10px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user {
            background: #10a37f;
            margin-left: auto;
        }

        .bot {
            background: #444654;
            margin-right: auto;
            font-family: monospace;
        }

        #input-box {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            background: #40414f;
            padding: 10px;
        }

        input {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: #40414f;
            color: white;
            font-size: 16px;
        }

        button {
            margin-left: 10px;
            padding: 14px 20px;
            background: #10a37f;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>Ansible AI Agent</header>

<div id="chat"></div>

<div id="input-box">
    <input id="message" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    let input = document.getElementById("message");
    let text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    let botDiv = addMessage("Processing...", "bot");

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    botDiv.innerText = "";

    while (true) {
        const {done, value} = await reader.read();
        if (done) break;

        botDiv.innerText += decoder.decode(value);
        scrollDown();
    }
}

function addMessage(text, cls) {
    let div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;

    document.getElementById("chat").appendChild(div);
    scrollDown();

    return div;
}

function scrollDown() {
    let chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
